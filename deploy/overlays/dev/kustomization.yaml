resources:
- ../../base

namePrefix: dev-
commonLabels:
  environment: development

patches:
- target:
    kind: Deployment
    name: chatbot
  patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: OLLAMA_URL
        value: "http://ollama.ollama.svc.cluster.local:11434/api/generate"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: OLLAMA_MODEL
        value: "qwen3"
