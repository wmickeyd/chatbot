resources:
- ../../base

namespace: chatbot-prod

namePrefix: prod-
commonLabels:
  environment: production

patches:
- target:
    kind: Deployment
    name: chatbot
  patch: |-
    # Increase resources for GKE production
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: "1Gi"
    # Placeholder for GKE Ollama URL
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: OLLAMA_URL
        value: "http://ollama-service.gke-namespace.svc.cluster.local:11434/api/generate"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: OLLAMA_MODEL
        value: "qwen3"
