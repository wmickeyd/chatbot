apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  labels:
    app: chatbot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      terminationGracePeriodSeconds: 5
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 8.8.8.8
      imagePullSecrets:
      - name: regcred
      containers:
      - name: chatbot
        image: wmcdonald/chatbot:latest
        imagePullPolicy: Always
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - find /tmp/health -mmin -2 | grep /tmp/health
          initialDelaySeconds: 30
          periodSeconds: 60
        env:
        - name: DISCORD_TOKEN
          valueFrom:
            secretKeyRef:
              name: chatbot-secrets
              key: DISCORD_TOKEN
        - name: SCRAPER_BASE_URL
          value: "http://dev-webscraper.webscraper-dev.svc.cluster.local"
        - name: UTILITY_BASE_URL
          value: "http://dev-utility-api.utility-dev.svc.cluster.local"
        - name: OLLAMA_URL
          value: "http://host.docker.internal:11434"
        - name: OLLAMA_MODEL
          value: "gemma3n:e4b"
        - name: OLLAMA_VISION_MODEL
          value: "moondream"
